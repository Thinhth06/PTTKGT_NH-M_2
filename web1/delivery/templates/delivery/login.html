<!DOCTYPE html>
<html>
<head>
    <title>Đăng nhập</title>
    <style>
        /* Chỉ căn giữa màn hình cho dễ nhìn */
        body { font-family: Arial; display: flex; justify-content: center; padding-top: 100px; background: #f0f2f5; }
        .box { background: white; padding: 20px; border: 1px solid #ccc; width: 300px; border-radius: 5px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đăng Nhập</h2>
        <form method="POST">
            {% csrf_token %}
            <label>Tài khoản:</label>
            <input type="text" name="username" required>
            
            <label>Mật khẩu:</label>
            <input type="password" name="password" required>
            
            <button type="submit">Vào hệ thống</button>
        </form>
        <p style="font-size: 13px;">Chưa có nick? <a href="{% url 'register' %}">Đăng ký ở đây</a></p>
    </div>
</body>
</html>
