<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Tối ưu Lộ trình Giao hàng</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        #map { height: 600px; width: 100%; }
        .info-panel { padding: 10px; background: #eee; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="info-panel">
    <strong>Khu vực:</strong> Bình Thạnh - Quận 1 - Bình Tân | 
    <span id="distance-info">Đang tính toán quãng đường...</span>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
    // 1. Khởi tạo bản đồ
    var map = L.map('map').setView([10.785, 106.680], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Tọa độ KHO (Võ Oanh, Bình Thạnh)
    var khoLat = 10.802;
    var khoLng = 106.713;

    // 3. Danh sách điểm giao hàng (Lấy từ Django truyền qua)
    // Ở đây mình ví dụ 2 điểm: Quận 1 và Bình Tân
    var destinations = [
        { name: "Đơn Quận 1", lat: 10.776, lng: 106.700 },
        { name: "Đơn Bình Tân", lat: 10.765, lng: 106.600 }
    ];

    // 4. Vẽ đường đi màu xanh từ Kho qua các điểm
    var waypoints = [ L.latLng(khoLat, khoLng) ]; // Bắt đầu tại Kho
    
    destinations.forEach(function(dest) {
        waypoints.push(L.latLng(dest.lat, dest.lng));
    });

    var control = L.Routing.control({
        waypoints: waypoints,
        lineOptions: {
            styles: [{ color: 'blue', opacity: 0.7, weight: 5 }] // Đường màu xanh
        },
        createMarker: function(i, wp, n) {
            // Tùy chỉnh icon: Điểm đầu là Kho, các điểm sau là Đơn hàng
            var markerText = (i === 0) ? "KHO TỔNG" : "ĐIỂM GIAO " + i;
            return L.marker(wp.latLng).bindPopup(markerText);
        },
        routeWhileDragging: true
    }).addTo(map);

    // 5. Lấy khoảng cách và hiển thị
    control.on('routesfound', function(e) {
        var routes = e.routes;
        var summary = routes[0].summary;
        // summary.totalDistance là mét, đổi ra km
        var distanceKm = (summary.totalDistance / 1000).toFixed(2);
        var timeMin = Math.round(summary.totalTime / 60);
        
        document.getElementById('distance-info').innerHTML = 
            "<b>Tổng quãng đường:</b> " + distanceKm + " km | <b>Thời gian dự kiến:</b> " + timeMin + " phút";
    });
</script>

</body>
</html>
