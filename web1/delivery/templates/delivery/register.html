<!DOCTYPE html>
<html>
<head>
    <title>Đăng ký</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; padding-top: 50px; background: #f0f2f5; }
        .box { background: white; padding: 20px; border: 1px solid #ccc; width: 400px; border-radius: 5px; }
        /* Style cho các ô nhập liệu mặc định của Django */
        input { width: 100%; padding: 5px; margin-top: 5px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tạo Tài Khoản Mới</h2>
        <form method="POST">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit">Đăng ký ngay</button>
        </form>
        <hr>
        <p style="font-size: 13px; text-align: center;">
            Quay lại <a href="{% url 'login' %}">Đăng nhập</a>
        </p>
    </div>
</body>
</html>
